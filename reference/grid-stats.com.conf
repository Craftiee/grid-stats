<VirtualHost *:80>
    ServerName grid-stats.com
    ServerAlias www.grid-stats.com
    DocumentRoot "/var/www/grid-stats.com/public_html"
    
    # Cloudflare handles HTTPS redirect, but keep this as backup
    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} !https
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    ErrorLog "/var/log/apache2/grid-stats.com-error.log"
    CustomLog "/var/log/apache2/grid-stats.com-access.log" combined
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin webmaster@grid-stats.com
    DocumentRoot "/var/www/grid-stats.com/public_html"
    ServerName grid-stats.com
    ServerAlias www.grid-stats.com
    
    # SSL Configuration
    # Option 1: Cloudflare Origin Certificate (recommended)
    SSLEngine on
    SSLCertificateFile /etc/cloudflare/grid-stats.com.pem
    SSLCertificateKeyFile /etc/cloudflare/grid-stats.com.key
    
    # Option 2: Let's Encrypt (uncomment if using)
    # SSLCertificateFile /etc/letsencrypt/live/grid-stats.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/grid-stats.com/privkey.pem
    
    <Directory "/var/www/grid-stats.com/public_html">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Get real visitor IP from Cloudflare (not Cloudflare's proxy IP)
    RemoteIPHeader CF-Connecting-IP
    
    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    
    ErrorLog "/var/log/apache2/grid-stats.com-ssl-error.log"
    CustomLog "/var/log/apache2/grid-stats.com-ssl-access.log" combined
</VirtualHost>
