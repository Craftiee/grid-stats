version: '3.8'

services:
  db:
    image: postgres:16
    container_name: gridstats_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gridstats}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Development only — do NOT run in production.
  # Start with: docker compose --profile dev up -d
  adminer:
    image: adminer
    container_name: gridstats_adminer
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      - db

volumes:
  postgres_data:
